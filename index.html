<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PresentIQ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-shell">
      <div class="brand-row">
        <div class="brand-mark">🌿</div>
        <input id="deckTitleInput" class="deck-title" value="Untitled presentation" aria-label="Presentation title" />
      </div>
      <nav class="menu-row" aria-label="Main menu">
        <div class="menu-item">File
          <div class="dropdown">
            <button data-action="download">Download (.pptx)</button>
            <button data-action="email">Email</button>
            <button data-action="rename">Rename</button>
            <button data-action="deleteDeck" class="danger">Delete presentation</button>
          </div>
        </div>
        <div class="menu-item">Edit
          <div class="dropdown">
            <button data-action="undo">Undo</button>
            <button data-action="redo">Redo</button>
            <button data-action="paste">Paste (Ctrl/Cmd+V)</button>
          </div>
        </div>
        <div class="menu-item">View</div>
        <div class="menu-item">Insert
          <div class="dropdown">
            <button data-action="insertTextbox">Text box</button>
            <button data-action="insertShape">Shape</button>
            <button data-action="insertLine">Line</button>
            <button data-action="insertImageSearch">Search image</button>
            <button data-action="newSlide">New slide</button>
          </div>
        </div>
        <div class="menu-item">Format</div>
        <div class="menu-item">Slide
          <div class="dropdown">
            <button data-action="newSlide">New slide</button>
            <button data-action="duplicateSlide">Duplicate slide</button>
            <button data-action="deleteSlide">Delete slide</button>
            <button data-action="toggleSkipSlide">Skip slide</button>
            <button data-action="focusTransition">Edit transition</button>
          </div>
        </div>
        <div class="menu-item">Arrange</div>
        <div class="menu-item">Tools</div>
        <div class="menu-item">Extensions</div>
        <div class="menu-item">Help</div>
      </nav>

      <div class="tool-row">
        <div class="left-tools">
          <input id="searchInput" class="search" placeholder="Search actions" title="Search actions" />
          <button id="addSlideBtn" title="New slide">＋</button>
          <button id="undoBtn" title="Undo">↶</button>
          <button id="redoBtn" title="Redo">↷</button>
          <label title="Zoom">Zoom
            <select id="zoomSelect">
              <option value="0.5">50%</option>
              <option value="0.75">75%</option>
              <option value="0.9">90%</option>
              <option value="1" selected>100%</option>
              <option value="1.25">125%</option>
            </select>
          </label>
          <button id="insertTextBtn" title="Insert text box">T</button>
          <div class="shape-dropdown-wrap">
            <button id="insertShapeBtn" title="Insert shape">◻ ▾</button>
            <div id="shapePicker" class="shape-picker hidden">
              <button data-shape="rect">Rectangle</button>
              <button data-shape="circle">Circle</button>
              <button data-shape="triangle">Triangle</button>
              <button data-shape="diamond">Diamond</button>
            </div>
          </div>
          <button id="insertLineBtn" title="Insert line">／</button>
          <button id="commentBtn" title="Comments">💬</button>
        </div>

        <div id="slideStyleTools" class="context-tools">
          <label title="Background">Background <input id="bgColorInput" type="color" value="#ffffff" /></label>
          <label title="Layout">Layout
            <select id="layoutSelect">
              <option value="title-subtitle">Title slide</option>
              <option value="title-body">Title + body</option>
            </select>
          </label>
          <label title="Theme">Theme
            <select id="themeSelect">
              <option value="aurora">Aurora</option>
              <option value="neon">Neon Grid</option>
              <option value="midnight">Midnight Glass</option>
              <option value="sunset">Sunset Pop</option>
            </select>
          </label>
          <label title="Transition">Transition
            <select id="transitionSelect">
              <option value="none">None</option>
              <option value="fade">Fade</option>
              <option value="slide">Slide</option>
            </select>
          </label>
        </div>

        <div id="textTools" class="context-tools hidden">
          <select id="fontFamilySelect" title="Font family">
            <option value="Arial">Arial</option>
            <option value="Poppins">Poppins</option>
            <option value="Inter">Inter</option>
            <option value="Georgia">Georgia</option>
            <option value="Courier New">Courier New</option>
          </select>
          <select id="fontSizeSelect" title="Font size">
            <option>14</option><option>18</option><option>24</option><option selected>32</option><option>40</option><option>56</option>
          </select>
          <button id="boldBtn" title="Bold">B</button>
          <button id="italicBtn" title="Italic"><em>I</em></button>
          <button id="underlineBtn" title="Underline"><u>U</u></button>
          <label title="Text color">A <input id="textColorInput" type="color" value="#202124" /></label>
          <label title="Highlight color">🖍 <input id="highlightColorInput" type="color" value="#fff59d" /></label>
          <select id="alignSelect" title="Align text">
            <option value="left">Align left</option>
            <option value="center">Align center</option>
            <option value="right">Align right</option>
            <option value="justify">Justify</option>
          </select>
          <select id="lineSpacingSelect" title="Line and paragraph spacing">
            <option value="1">Single</option>
            <option value="1.15">1.15</option>
            <option value="1.5">1.5</option>
            <option value="2">Double</option>
          </select>
          <button id="bulletsBtn" title="Bulleted list">• List</button>
        </div>

        <button id="presentBtn" class="present-btn">Slideshow</button>
      </div>
    </header>

    <main class="app-body">
      <aside class="slides-rail">
        <ol id="slideList"></ol>
      </aside>

      <section class="editor-stage">
        <div class="ruler"></div>
        <div class="canvas-wrap">
          <article id="slideCanvas" class="slide-canvas"></article>
        </div>
        <textarea id="speakerNotes" class="speaker-notes" placeholder="Click to add speaker notes"></textarea>
      </section>

      <aside class="cue-panel">
        <h3>Vocal cue</h3>
        <p>Required for each slide.</p>
        <input id="cueInput" placeholder="Say this to go next" />
        <div class="selected-tools">
          <label>Selected fill color
            <input id="selectedColorInput" type="color" value="#3f8b5a" />
          </label>
          <label>Rotation
            <input id="selectedRotateInput" type="range" min="0" max="360" value="0" />
          </label>
        </div>
      </aside>
    </main>

    <section id="presentOverlay" class="present-overlay hidden">
      <div class="present-controls">
        <button id="prevBtn">← Prev</button>
        <button id="listenBtn" class="present-btn">Cue listening</button>
        <button id="nextBtn">Next →</button>
        <button id="exitBtn" class="danger">Exit</button>
      </div>
      <article id="presentSlide" class="present-slide"></article>
      <div class="cue-bottom"><span id="listenStatus">Mic idle</span><span>Cue: <strong id="presentCue">—</strong></span></div>
    </section>

    <dialog id="micDialog" class="app-dialog">
      <h3>Enable microphone for cue listening?</h3>
      <p>If you approve, cue listening starts automatically as the slideshow begins.</p>
      <div class="dialog-actions">
        <button id="micNoBtn">No</button>
        <button id="micYesBtn" class="present-btn">Yes, enable mic</button>
      </div>
    </dialog>

    <dialog id="imageDialog" class="app-dialog">
      <h3>Insert image URL</h3>
      <input id="imageUrlInput" placeholder="Paste image URL" />
      <div class="dialog-actions">
        <button id="imageCancelBtn">Cancel</button>
        <button id="imageInsertBtn" class="present-btn">Insert</button>
      </div>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
